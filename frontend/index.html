<style>
html{scroll-behavior:smooth}
:root{--bg:#F8FAFC;--bg2:#EEF2F7;--bg3:#E5EBF2;--card:#ffffff;--text:#0F172A;--text2:#334155;--muted:#64748B;--faint:#94A3B8;--line1:rgba(15,23,42,.08);--line2:rgba(15,23,42,.11);--line3:rgba(15,23,42,.18);--primary:#00AEEF;--primary-ink:#ffffff;--green:#0E9F6E;--cyan:#0284C7;--purple2:#D97706;--header:rgba(248,250,252,.9);--shadow:rgba(15,23,42,.12)}
body[data-theme="dark"]{--bg:#0B1220;--bg2:#0F172A;--bg3:#080E1A;--card:#141F38;--text:#E6EEF9;--text2:#94A3B8;--muted:#647591;--faint:#455571;--line1:rgba(226,236,250,.08);--line2:rgba(226,236,250,.11);--line3:rgba(226,236,250,.17);--primary:#22B8F0;--primary-ink:#04202B;--green:#2EE6A6;--cyan:#38BDF8;--purple2:#FFB020;--header:rgba(11,18,32,.85);--shadow:rgba(0,0,0,.5)}
*{box-sizing:border-box}
body{transition:background .3s ease,color .3s ease;margin:0;background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--cyan);text-decoration:none;transition:color .18s ease}
a:hover{color:var(--green)}
img{max-width:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes drip{0%{transform:translateY(-2px);opacity:0}30%{opacity:1}100%{transform:translateY(10px);opacity:0}}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
::selection{background:var(--primary);color:var(--primary-ink)}

/* ---- interaction states (ported from the design's style-hover) ---- */
.nav-link:hover{color:var(--primary)!important}
.foot-link:hover{color:var(--primary)!important}
.icon-btn{transition:border-color .18s ease,color .18s ease}
.icon-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-login{transition:background .18s ease}
.btn-login:hover{background:var(--line1);color:var(--text)}
.btn-primary{transition:transform .18s ease,box-shadow .18s ease}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(46,230,166,.25);color:var(--primary-ink)}
.btn-primary-lg{transition:transform .18s ease,box-shadow .18s ease}
.btn-primary-lg:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(46,230,166,.3);color:var(--primary-ink)}
.btn-ghost{transition:border-color .18s ease,background .18s ease}
.btn-ghost:hover{border-color:var(--cyan);background:rgba(34,211,238,.06);color:var(--text)}
.card-cyan{transition:transform .2s ease,border-color .2s ease}
.card-cyan:hover{transform:translateY(-4px);border-color:rgba(34,211,238,.4)}
.card-green{transition:transform .2s ease,border-color .2s ease}
.card-green:hover{transform:translateY(-3px);border-color:rgba(46,230,166,.35)}
.chip-purple{transition:border-color .2s ease}
.chip-purple:hover{border-color:rgba(230,140,20,.55)}
.game-card{transition:transform .2s ease,border-color .2s ease}
.game-card:hover{transform:scale(1.02);border-color:rgba(46,230,166,.35)}
.btn-play{transition:background .18s ease}
.btn-play:hover{background:rgba(46,230,166,.2);color:var(--green)}
.ref-row{transition:border-color .2s ease}
.ref-row:hover{border-color:rgba(230,140,20,.5)}
.vault-card{transition:transform .2s ease}
.vault-card:hover{transform:translateY(-4px)}
.trust-card{transition:border-color .2s ease}
.trust-card:hover{border-color:rgba(34,211,238,.35)}
details.faq{transition:border-color .2s ease}
details.faq[open]{border-color:rgba(34,211,238,.35)}
details.faq summary{cursor:pointer;font-weight:700;font-size:15.5px;padding:18px 0;list-style:none;display:flex;justify-content:space-between;align-items:center}
details.faq summary::-webkit-details-marker{display:none}
details.faq[open] summary .faq-plus{transform:rotate(45deg)}
.faq-plus{color:var(--cyan);font-size:18px;flex:none;margin-left:16px;transition:transform .2s ease}
</style>

    // GAMES
    var gameCards = d.games.map(function(g){
      return '<div class="game-card" style="background:var(--card);border:1px solid var(--line2);border-radius:16px;overflow:hidden">'+
        '<div style="height:120px;display:grid;place-items:center;background:'+g.bg+'"><img src="'+g.img+'" alt="" style="height:72px;width:auto;object-fit:contain;display:block;filter:drop-shadow(0 8px 16px rgba(15,23,42,.14))"></div>'+
        '<div style="padding:18px 20px">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:800;font-size:15.5px">'+esc(g.name)+'</span><span style="font-size:10.5px;font-weight:700;letter-spacing:.06em;color:'+g.diffColor+';border:1px solid '+g.diffColor+';border-radius:6px;padding:2px 7px">'+esc(g.diff)+'</span></div>'+
          '<div style="color:var(--text2);font-size:13px;line-height:1.5;margin-bottom:12px">'+esc(g.desc)+'</div>'+
          '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:14px"><span>⚡ '+esc(g.energy)+'</span><span style="font-family:\'JetBrains Mono\',monospace;color:var(--green)">'+esc(g.reward)+'</span></div>'+
          '<a href="'+APP+'" class="btn-play" style="display:block;text-align:center;background:rgba(46,230,166,.1);border:1px solid rgba(46,230,166,.3);color:var(--green);font-weight:800;font-size:13px;padding:9px;border-radius:9px">'+esc(t.gmPlay)+'</a>'+
        '</div></div>';
    }).join('');
    var games =
    '<section id="games" style="border-top:1px solid var(--line1);background:var(--bg2)"><div style="max-width:1200px;margin:0 auto;padding:80px 24px">'+
      '<h2 style="font-family:\'Space Grotesk\',sans-serif;font-size:34px;margin:0 0 10px;letter-spacing:-.01em">'+esc(t.gmTitle)+'</h2>'+
      '<p style="color:var(--text2);margin:0 0 44px;font-size:16px">'+esc(t.gmSub)+'</p>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px">'+gameCards+'</div>'+
    '</div></section>';

    // MINING CREW (referrals)
    var refRows = d.refLevels.map(function(r){
      return '<div class="ref-row" style="background:var(--card);border:1px solid rgba(230,140,20,.18);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px">'+
        '<div style="width:52px;height:52px;flex:none;border-radius:14px;display:grid;place-items:center;background:rgba(230,140,20,'+r.alpha+')"><img src="'+r.img+'" alt="" style="width:34px;height:34px;object-fit:contain;display:block"></div>'+
        '<div style="flex:1"><div style="font-weight:700;font-size:14px">'+esc(r.label)+'</div><div style="font-size:12.5px;color:var(--muted)">'+esc(r.note)+'</div></div>'+
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:17px;color:var(--purple2);font-weight:600">'+esc(r.pct)+'</div></div>';
    }).join('');
    var crew =
    '<section style="max-width:1200px;margin:0 auto;padding:80px 24px;display:flex;gap:56px;flex-wrap:wrap;align-items:center">'+
      '<div style="flex:1 1 380px;min-width:300px">'+
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:var(--purple2);letter-spacing:.12em;margin-bottom:14px">MINING CREW</div>'+
        '<h2 style="font-family:\'Space Grotesk\',sans-serif;font-size:34px;margin:0 0 16px;letter-spacing:-.01em">'+esc(t.rfTitle)+'</h2>'+
        '<p style="color:var(--text2);font-size:16px;line-height:1.65;margin:0 0 20px;max-width:480px">'+esc(t.rfDesc)+'</p>'+
        '<p style="font-size:12.5px;color:var(--muted);line-height:1.55;border-left:2px solid rgba(230,140,20,.5);padding-left:14px;max-width:460px">'+esc(t.rfLegal)+'</p>'+
      '</div>'+
      '<div style="flex:1 1 420px;min-width:300px;display:flex;flex-direction:column;gap:10px">'+refRows+'<div style="font-size:11.5px;color:var(--muted);padding:4px 6px">'+esc(t.rfConfigNote)+'</div></div>'+
    '</section>';

    // VAULT
    var vaultCards = d.vaultOptions.map(function(v){
      return '<div class="vault-card" style="background:var(--card);border:1px solid '+v.border+';border-radius:16px;padding:24px;text-align:center"><div style="font-weight:800;font-size:16px;margin-bottom:4px">'+esc(v.name)+'</div><div style="font-size:12.5px;color:var(--muted);margin-bottom:14px">'+esc(v.note)+'</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:26px;color:var(--purple2);font-weight:600">'+esc(v.mult)+'</div><div style="font-size:11.5px;color:var(--muted);margin-top:6px">'+esc(t.vtMultNote)+'</div></div>';
    }).join('');
    var vault =
    '<section style="border-top:1px solid var(--line1);background:var(--bg2)"><div style="max-width:1200px;margin:0 auto;padding:80px 24px">'+
      '<div style="text-align:center;max-width:640px;margin:0 auto 44px"><div style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:var(--purple2);letter-spacing:.12em;margin-bottom:14px">ZYXE VAULT</div><h2 style="font-family:\'Space Grotesk\',sans-serif;font-size:34px;margin:0 0 14px;letter-spacing:-.01em">'+esc(t.vtTitle)+'</h2><p style="color:var(--text2);font-size:16px;line-height:1.6;margin:0">'+esc(t.vtDesc)+'</p></div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;max-width:980px;margin:0 auto">'+vaultCards+'</div>'+
      '<p style="text-align:center;font-size:12.5px;color:var(--muted);max-width:620px;margin:30px auto 0;line-height:1.55">'+esc(t.vtLegal)+'</p>'+
    '</div></section>';

    // CONVERSION
    var cvPts = d.cvPoints.map(function(p){
      return '<div style="display:flex;gap:12px;align-items:flex-start;font-size:14px;color:var(--text2);line-height:1.5"><span style="color:var(--cyan);flex:none;margin-top:1px">✓</span> '+esc(p)+'</div>';
    }).join('');
    var coinRows = d.cryptos.map(function(c){
      return '<div style="display:flex;align-items:center;gap:14px;background:var(--bg2);border-radius:11px;padding:12px 16px"><img src="'+c.img+'" alt="'+esc(c.name)+'" style="width:34px;height:34px;flex:none;border-radius:50%;display:block"><span style="flex:1;font-weight:700;font-size:14.5px">'+esc(c.name)+'</span><span style="font-size:11.5px;color:'+c.statusColor+';font-weight:700">'+esc(c.status)+'</span></div>';
    }).join('');
    var conv =
    '<section style="max-width:1200px;margin:0 auto;padding:80px 24px;display:flex;gap:56px;flex-wrap:wrap;align-items:center">'+
      '<div style="flex:1 1 380px;min-width:300px">'+
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:var(--cyan);letter-spacing:.12em;margin-bottom:14px">'+esc(t.cvTag)+'</div>'+
        '<h2 style="font-family:\'Space Grotesk\',sans-serif;font-size:34px;margin:0 0 16px;letter-spacing:-.01em">'+esc(t.cvTitle)+'</h2>'+
        '<p style="color:var(--text2);font-size:16px;line-height:1.65;margin:0 0 22px;max-width:480px">'+esc(t.cvDesc)+'</p>'+
        '<div style="display:flex;flex-direction:column;gap:10px;max-width:480px">'+cvPts+'</div>'+
      '</div>'+
      '<div style="flex:1 1 400px;min-width:300px"><div style="background:var(--card);border:1px solid var(--line2);border-radius:18px;padding:26px;box-shadow:0 20px 60px var(--shadow)"><div style="font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--muted);margin-bottom:18px">'+esc(t.cvCardTitle)+'</div><div style="display:flex;flex-direction:column;gap:10px">'+coinRows+'</div></div></div>'+
    '</section>';

    // TRUST
    var trustCards = d.trustItems.map(function(ti){
      return '<div class="trust-card" style="background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:22px"><div style="margin-bottom:14px"><img src="'+ti.img+'" alt="" style="width:52px;height:52px;object-fit:contain;display:block"></div><div style="font-weight:800;font-size:15px;margin-bottom:6px">'+esc(ti.title)+'</div><div style="color:var(--text2);font-size:13.5px;line-height:1.5">'+esc(ti.desc)+'</div></div>';
    }).join('');
    var trust =
    '<section style="border-top:1px solid var(--line1);background:var(--bg2)"><div style="max-width:1200px;margin:0 auto;padding:80px 24px">'+
      '<h2 style="font-family:\'Space Grotesk\',sans-serif;font-size:34px;margin:0 0 10px;letter-spacing:-.01em;text-align:center">'+esc(t.tsTitle)+'</h2>'+
      '<p style="color:var(--text2);margin:0 auto 44px;font-size:16px;text-align:center;max-width:560px">'+esc(t.tsSub)+'</p>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px">'+trustCards+'</div>'+
    '</div></section>';

    // FAQ
    var faqItems = d.faqs.map(function(f){
      return '<details class="faq" style="background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:0 22px"><summary>'+esc(f.q)+'<span class="faq-plus">+</span></summary><p style="color:var(--text2);font-size:14.5px;line-height:1.65;margin:0;padding:0 0 20px">'+esc(f.a)+'</p></details>';
    }).join('');
    var faq =
    '<section id="faq" style="max-width:840px;margin:0 auto;padding:80px 24px">'+
      '<h2 style="font-family:\'Space Grotesk\',sans-serif;font-size:34px;margin:0 0 40px;letter-spacing:-.01em;text-align:center">FAQ</h2>'+
      '<div style="display:flex;flex-direction:column;gap:12px">'+faqItems+'</div>'+
    '</section>';

    // CTA
    var cta =
    '<section style="max-width:1200px;margin:0 auto;padding:20px 24px 90px;text-align:center"><div style="background:linear-gradient(135deg,var(--card),var(--card));border:1px solid rgba(46,230,166,.2);border-radius:22px;padding:64px 32px">'+
      '<img class="js-logo" src="'+logoSrc()+'" alt="" style="height:52px;margin-bottom:22px;opacity:.95">'+
      '<h2 style="font-family:\'Space Grotesk\',sans-serif;font-size:32px;margin:0 0 12px;letter-spacing:-.01em">'+esc(t.finalTitle)+'</h2>'+
      '<p style="color:var(--text2);font-size:16px;margin:0 0 30px">'+esc(t.finalSub)+'</p>'+
      '<a href="'+APP+'" class="btn-primary-lg" style="display:inline-block;background:var(--primary);color:var(--primary-ink);font-size:16px;font-weight:800;padding:15px 36px;border-radius:12px">'+esc(t.ctaStart)+'</a>'+
    '</div></section>';

    // FOOTER
    var fl = function(href,label){ return '<a href="'+href+'" class="foot-link" style="color:var(--text2);font-size:13.5px">'+esc(label)+'</a>'; };
    var footer =
    '<footer style="border-top:1px solid var(--line1);background:var(--bg3)"><div style="max-width:1200px;margin:0 auto;padding:52px 24px 40px">'+
      '<div style="display:flex;gap:48px;flex-wrap:wrap;justify-content:space-between;margin-bottom:36px">'+
        '<div style="max-width:320px"><img class="js-logo" src="'+logoSrc()+'" alt="Fauzet" style="height:34px;margin-bottom:14px"><p style="color:var(--muted);font-size:13px;line-height:1.6;margin:0">'+esc(t.ftAbout)+'</p></div>'+
        '<div style="display:flex;gap:48px;flex-wrap:wrap">'+
          '<div style="display:flex;flex-direction:column;gap:9px"><div style="font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">'+esc(t.ftLegal)+'</div>'+fl('#faq',t.ftTerms)+fl('#faq',t.ftPrivacy)+fl('#faq',t.ftRisk)+fl('#faq',t.ftRewardPolicy)+fl('#faq',t.ftWithdrawPolicy)+'</div>'+
          '<div style="display:flex;flex-direction:column;gap:9px"><div style="font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">'+esc(t.ftPlatform)+'</div>'+fl('#how',t.navHow)+fl('#games',t.navGames)+fl('#mining',t.navMining)+fl(APP,t.login)+'</div>'+
          '<div style="display:flex;flex-direction:column;gap:9px"><div style="font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">'+esc(t.ftSupport)+'</div>'+fl('#faq',t.ftContact)+fl('#faq',t.ftStatus)+fl('#faq','FAQ')+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="border-top:1px solid var(--line1);padding-top:24px;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center"><span style="color:var(--faint);font-size:12px">© 2026 Fauzet. '+esc(t.ftRights)+'</span><button data-act="lang" class="icon-btn" style="background:none;border:1px solid var(--line3);color:var(--muted);border-radius:8px;padding:6px 12px;font-family:\'JetBrains Mono\',monospace;font-size:11.5px;cursor:pointer">'+(state.lang==='es'?'ES · EN':'EN · ES')+'</button></div>'+
      '<p style="color:var(--faint);font-size:11.5px;line-height:1.6;margin:22px 0 0;max-width:900px">'+esc(t.ftDisclaimer)+'</p>'+
    '</div></footer>';

    return header+hero+how+earn+zyxe+mining+games+crew+vault+conv+trust+faq+cta+footer;
  }

  function render(){
    document.documentElement.lang = state.lang;
    document.getElementById('app').innerHTML = view();
    bind();
  }

  function bind(){
    var els = document.querySelectorAll('[data-act]');
    els.forEach(function(el){
      el.addEventListener('click', function(e){
        var act = el.getAttribute('data-act');
        if(act === 'lang'){
          state.lang = state.lang === 'en' ? 'es' : 'en';
          render();
        } else if(act === 'theme'){
          state.theme = state.theme === 'dark' ? 'light' : 'dark';
          document.body.dataset.theme = state.theme;
          try { localStorage.setItem('fz_theme', state.theme); } catch(err){}
          // swap logos in place (no re-render needed)
          document.querySelectorAll('.js-logo').forEach(function(img){ img.src = logoSrc(); });
          // update the theme button glyph
          if(act === 'theme'){ el.textContent = state.theme === 'dark' ? '☀️' : '🌙'; }
        }
      });
    });
  }

  function init(){
    var saved = null;
    try { saved = localStorage.getItem('fz_theme'); } catch(e){}
    state.theme = saved === 'dark' ? 'dark' : 'light';
    document.body.dataset.theme = state.theme;
    render();
    // faucet countdown
    setInterval(function(){
      state.secs = state.secs > 0 ? state.secs - 1 : 3600;
      var el = document.getElementById('heroCountdown');
      if(el) el.textContent = countdown();
    }, 1000);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }
})();
</script>
</body>
</html>
